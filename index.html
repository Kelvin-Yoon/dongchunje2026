<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태성 축제 부스 맵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #2d6a2d;
    --green-main: #4caf50;
    --green-light: #a5d6a7;
    --accent: #ff6b35;
    --accent2: #ffd600;
    --white: #fff;
    --gray: #555;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8f5e9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 48px;
  }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--green-dark);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--gray);
    margin-bottom: 20px;
    text-align: center;
  }

  /* ===== MAP CONTAINER ===== */
  .map-wrap {
    position: relative;
    width: 100%;
    max-width: 820px;
    aspect-ratio: 820 / 980;
  }
  .map-wrap img.bg {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  /* ===== INVISIBLE BOOTH BUTTONS ===== */
  .booth-btn {
    position: absolute;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    z-index: 10;
    padding: 0;
  }
  .booth-btn:hover {
    background: rgba(255, 107, 53, 0.25);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .booth-btn:hover::after {
    content: attr(data-name);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--green-dark);
    color: #fff;
    font-size: 11px;
    white-space: nowrap;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 100;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 440px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-header {
    background: linear-gradient(135deg, var(--green-dark), var(--green-main));
    padding: 22px 24px 18px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-header .num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2.2rem;
    color: rgba(255,255,255,0.4);
    line-height: 1;
    min-width: 52px;
  }
  .modal-header .title-wrap { flex: 1; }
  .modal-header .booth-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.25rem;
    color: #fff;
    line-height: 1.3;
  }
  .modal-header .tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
  }
  .modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    font-size: 1.3rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }

  .modal-body {
    padding: 24px;
  }
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 0.9rem;
    color: #333;
    line-height: 1.5;
  }
  .info-row .icon {
    font-size: 1.1rem;
    min-width: 22px;
    text-align: center;
    margin-top: 1px;
  }
  .info-row .label {
    font-weight: 700;
    color: var(--green-dark);
    min-width: 54px;
  }

  .badge-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .badge {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.zone { background: #e8f5e9; color: var(--green-dark); }
  .badge.type { background: #fff3e0; color: #e65100; }

  /* ===== LEGEND ===== */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    max-width: 820px; width: 100%;
    margin-top: 16px;
    justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #555;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
</style>
</head>

  { id:25, name:"버스킹무대",                      pos:[44,65,10,6],  tag:"공연",   loc:"중앙", desc:"다양한 공연자들이 펼치는 버스킹 무대", op:"공연팀", zone:"중앙", type:"공연" },
  { id:26, name:"공돌이용달이 특강 / OB선생님 휴식공간", pos:[54,90,18,7], tag:"공연", loc:"하단 공연장", desc:"공돌이용달이 특별 강연 및 OB 선생님 음악실 휴식 공간", op:"특별 게스트", zone:"하단", type:"공연" },
];

// Tag → color map
const tagColor = {
  "먹거리":"#ff6b35","바자회":"#ff9800","나눔":"#9c27b0",
  "체험":"#4caf50","전시":"#2196f3","홍보":"#607d8b",
  "이벤트":"#e91e63","공연":"#3f51b5","교육":"#009688","판매":"#f44336"
};

function createButtons() {
  const wrap = document.getElementById('mapWrap');
  booths.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'booth-btn';
    btn.dataset.id = b.id;
    btn.dataset.name = `${b.id}. ${b.name}`;
    btn.style.left   = b.pos[0] + '%';
    btn.style.top    = b.pos[1] + '%';
    btn.style.width  = b.pos[2] + '%';
    btn.style.height = b.pos[3] + '%';
    btn.addEventListener('click', () => openModal(b));
    wrap.appendChild(btn);
  });
}

function openModal(b) {
  document.getElementById('mNum').textContent  = String(b.id).padStart(2,'0');
  document.getElementById('mName').textContent = b.name;
  document.getElementById('mTag').textContent  = b.tag;
  document.getElementById('mLoc').textContent  = b.loc;
  document.getElementById('mDesc').textContent = b.desc;
  document.getElementById('mOp').textContent   = b.op;
  document.getElementById('mZone').textContent = b.zone + ' 구역';
  document.getElementById('mType').textContent = b.type;

  const hdr = document.querySelector('.modal-header');
  const col = tagColor[b.tag] || '#4caf50';
  hdr.style.background = `linear-gradient(135deg, ${col}cc, ${col})`;

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('active');
});

createButtons();
</script>
</body>
</html>
