<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태성고 축제 인터랙티브 맵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a2a1a; font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  header { width:100%; text-align:center; padding:24px 16px 12px; background:linear-gradient(180deg,#0d1f0d 0%,transparent 100%); }
  header h1 { font-size:2rem; font-weight:900; color:#fff; letter-spacing:-0.03em; text-shadow:0 2px 12px rgba(0,0,0,.5); }
  header p  { color:#8fbe6b; font-size:.9rem; margin-top:4px; font-weight:600; }

  /* Loader */
  #loaderBox {
    margin:30px auto; max-width:500px; width:90%;
    background:rgba(255,255,255,.07); border:2px dashed #4caf50;
    border-radius:20px; padding:40px 24px; text-align:center;
    cursor:pointer; transition:background .2s;
  }
  #loaderBox:hover { background:rgba(76,175,80,.14); }
  #loaderBox .icon { font-size:3rem; margin-bottom:12px; }
  #loaderBox h2 { color:#fff; font-size:1.1rem; font-weight:700; margin-bottom:8px; }
  #loaderBox p  { color:#8fbe6b; font-size:.85rem; line-height:1.6; }
  #fileInput { display:none; }

  /* Map */
  .map-wrapper { position:relative; width:100%; max-width:900px; margin:0 auto; padding:10px; display:none; }
  .map-container { position:relative; width:100%; }
  .map-container img { width:100%; height:auto; display:block; border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.6); }
  .map-overlay { position:absolute; top:0; left:0; width:100%; height:100%; }

  /* Buttons */
  .booth-btn { position:absolute; background:transparent; border:none; cursor:pointer; border-radius:6px; transition:all .2s; }
  .booth-btn:hover { background:rgba(255,220,50,.4); box-shadow:0 0 0 3px rgba(255,220,50,.8),0 0 18px rgba(255,220,50,.5); transform:scale(1.12); z-index:10; }
  .booth-btn .tip {
    position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
    background:#1a2a1a; color:#fff; font-size:11px; font-weight:700;
    padding:4px 8px; border-radius:6px; white-space:nowrap;
    opacity:0; pointer-events:none; transition:opacity .2s;
    border:1px solid #4caf50; z-index:20; font-family:'Noto Sans KR',sans-serif;
  }
  .booth-btn:hover .tip { opacity:1; }

  /* Modal */
  .backdrop { display:none; position:fixed; inset:0; background:rgba(10,25,10,.78); backdrop-filter:blur(6px); z-index:1000; align-items:center; justify-content:center; padding:20px; }
  .backdrop.open { display:flex; animation:fadeIn .22s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal { background:#fff; border-radius:22px; max-width:480px; width:100%; overflow:hidden; box-shadow:0 28px 70px rgba(0,0,0,.55); animation:slideUp .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes slideUp { from{transform:translateY(40px) scale(.93);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

  .mh { padding:26px 24px 20px; color:#fff; position:relative; }
  .mnum { font-size:.72rem; font-weight:800; background:rgba(255,255,255,.22); display:inline-block; padding:3px 10px; border-radius:20px; letter-spacing:.1em; margin-bottom:8px; }
  .mtitle { font-size:1.45rem; font-weight:900; line-height:1.25; }
  .mcat   { margin-top:7px; font-size:.8rem; opacity:.88; font-weight:600; }
  .mclose { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.2); border:none; color:#fff; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center; transition:background .18s; }
  .mclose:hover { background:rgba(255,255,255,.38); }

  .mb { padding:20px 24px 26px; }
  .memoji { font-size:2.6rem; display:block; margin-bottom:12px; }
  .igrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .icard { background:#f4f9f1; border-radius:12px; padding:12px 14px; border-left:3px solid #4caf50; }
  .icard .lbl { font-size:.68rem; font-weight:800; color:#4caf50; text-transform:uppercase; letter-spacing:.07em; margin-bottom:3px; }
  .icard .val { font-size:.88rem; font-weight:600; color:#1a2a1a; }
  .mdesc { font-size:.88rem; color:#444; line-height:1.72; background:#f9f9f9; border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .tags  { display:flex; flex-wrap:wrap; gap:6px; }
  .tag   { font-size:.76rem; font-weight:700; padding:5px 12px; border-radius:20px; border:1px solid; }

  .legend { color:#8fbe6b; font-size:.78rem; text-align:center; padding:10px 16px 28px; opacity:.75; }
</style>
</head>
<body>

<header>
  <h1>🎉 태성고 축제 부스 맵</h1>
  <p>번호를 클릭하면 부스 상세정보를 확인할 수 있어요</p>
</header>

<div id="loaderBox" onclick="document.getElementById('fileInput').click()">

  <h2>칼라 축제 맵 이미지를 불러오세요</h2>

    이 영역으로 드래그&드롭 해주세요
  </p>
  <input type="file" id="fileInput" accept="image/*">
</div>

<div class="map-wrapper" id="mapWrapper">
  <div class="map-container">
    <img id="mapImg" src="" alt="축제 맵">
    <div class="map-overlay" id="mapOverlay"></div>
  </div>
</div>

<div class="legend">💡 마우스를 올리면 부스명이, 클릭하면 상세정보가 표시됩니다</div>

<!-- Modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="mh" id="mh">
      <span class="mnum"  id="mnum"></span>
      <button class="mclose" id="mclose">✕</button>
      <div class="mtitle" id="mtitle"></div>
      <div class="mcat"   id="mcat"></div>
    </div>
    <div class="mb">
      <span class="memoji" id="memoji"></span>
      <div class="igrid"  id="igrid"></div>
      <div class="mdesc"  id="mdesc"></div>
      <div class="tags"   id="mtags"></div>
    </div>
  </div>
</div>

const gc = c => cc[c]||"#4caf50";

// File loader
const fi = document.getElementById('fileInput');
const lb = document.getElementById('loaderBox');
const mw = document.getElementById('mapWrapper');
const mi = document.getElementById('mapImg');
const mo = document.getElementById('mapOverlay');

lb.addEventListener('dragover', e=>{e.preventDefault();lb.style.background='rgba(76,175,80,.2)';});
lb.addEventListener('dragleave',()=>{lb.style.background='';});
lb.addEventListener('drop',e=>{e.preventDefault();lb.style.background='';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))load(f);});
fi.addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});

function load(file){
  const r=new FileReader();
  r.onload=ev=>{
    mi.src=ev.target.result;
    lb.style.display='none';
    mw.style.display='block';
    build();
  };
  r.readAsDataURL(file);
}

function build(){
  mo.innerHTML='';
  positions.forEach(p=>{
    const b=booths.find(x=>x.id===p.id);
    const btn=document.createElement('button');
    btn.className='booth-btn';
    btn.style.cssText=`left:${p.x}%;top:${p.y}%;width:${p.w}%;height:${p.h}%;`;
    const t=document.createElement('span');
    t.className='tip';
    t.textContent=`#${p.id} ${b?b.name:''}`;
    btn.appendChild(t);
    btn.addEventListener('click',()=>open_(p.id));
    mo.appendChild(btn);
  });
}

// Modal
const bd=document.getElementById('backdrop');
function open_(id){
  const b=booths.find(x=>x.id===id);if(!b)return;
  const c=gc(b.cat);
  document.getElementById('mh').style.background=`linear-gradient(135deg,${c}cc,${c})`;
  document.getElementById('mnum').textContent=`BOOTH #${b.id}`;
  document.getElementById('mtitle').textContent=b.name;
  document.getElementById('mcat').textContent=`📍 ${b.cat}`;
  document.getElementById('memoji').textContent=b.emoji;
  document.getElementById('mdesc').textContent=b.desc;
  document.getElementById('igrid').innerHTML=`
    <div class="icard"><div class="lbl">📍 위치</div><div class="val">${b.loc}</div></div>
    <div class="icard"><div class="lbl">🕐 운영시간</div><div class="val">${b.time}</div></div>`;
  document.getElementById('mtags').innerHTML=b.tags.map(t=>`<span class="tag" style="color:${c};border-color:${c}55;background:${c}18">#${t}</span>`).join('');
  bd.classList.add('open');
}
document.getElementById('mclose').addEventListener('click',()=>bd.classList.remove('open'));
bd.addEventListener('click',e=>{if(e.target===bd)bd.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')bd.classList.remove('open');});
</script>
